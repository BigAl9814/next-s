[images]
remote_images = [
  "^(?:https:\\/\\/storage\\.googleapis\\.com(?:\\/(?!\\.)(?:(?:(?!(?:^|\\/)\\.).)*?)|$))$"
]

[build]
command = "npm run build"
publish = ".next"

[[plugins]]
package = "@netlify/plugin-nextjs"

[[headers]]
for = "/_next/static/*"

  [headers.values]
  Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
from = "/_next/image"
to = "/.netlify/images?url=:url&w=:width&q=:quality"
status = 200

  [redirects.query]
  url = ":url"
  w = ":width"
  q = ":quality"

[[redirects]]
from = "/_ipx/*"
to = "/.netlify/images?url=:url&w=:width&q=:quality"
status = 200

  [redirects.query]
  url = ":url"
  w = ":width"
  q = ":quality"

[context]

  [context.deploy-preview]

    [context.deploy-preview.images]
    remote_images = [
      "^(?:https:\\/\\/storage\\.googleapis\\.com(?:\\/(?!\\.)(?:(?:(?!(?:^|\\/)\\.).)*?)|$))$"
    ]

    [[context.deploy-preview.headers]]
    for = "/_next/static/*"

      [context.deploy-preview.headers.values]
      Cache-Control = "public, max-age=31536000, immutable"

  [context.agent-hooks-as-client-components-ff62]

    [context.agent-hooks-as-client-components-ff62.images]
    remote_images = [
      "^(?:https:\\/\\/storage\\.googleapis\\.com(?:\\/(?!\\.)(?:(?:(?!(?:^|\\/)\\.).)*?)|$))$"
    ]

    [[context.agent-hooks-as-client-components-ff62.headers]]
    for = "/_next/static/*"

      [context.agent-hooks-as-client-components-ff62.headers.values]
      Cache-Control = "public, max-age=31536000, immutable"